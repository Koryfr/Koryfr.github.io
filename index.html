<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kory Eoga - Portfolio BTS SIO SISR</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
 
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-padding-top: 100px; }
 
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  color: #fff;
  background: linear-gradient(135deg, #4a148c, #6a1b9a, #8e24aa);
}
 
.container { max-width: 1200px; margin: auto; padding: 20px; }
 
header {
  background: rgba(74,20,140,0.95);
  position: fixed;
  top:0; left:0; right:0;
  z-index:1000;
  padding:10px;
}
 
nav { display:flex; justify-content:space-between; align-items:center; }
 
.logo { font-weight:bold; cursor:pointer; }
 
.nav-links { display:flex; gap:15px; list-style:none; }
 
.nav-links a {
  color:white;
  text-decoration:none;
  padding:5px 10px;
  border-radius:20px;
}
 
.nav-links a.active-link {
  background:rgba(255,255,255,0.2);
}
 
main { margin-top:80px; }
 
.section { display:none; }
.section.active { display:block; }
 
.card {
  background: rgba(74,20,140,0.4);
  padding:20px;
  border-radius:10px;
  margin-top:20px;
}
 
.section-header {
  text-align:center;
  margin-bottom:20px;
}
 
iframe {
  width:100%;
  height:600px;
  border:none;
  border-radius:10px;
}
 
footer {
  text-align:center;
  padding:20px;
}
</style>
</head>
 
<body>
 
<header>
<nav class="container">
<span class="logo" onclick="showSection('parcours')">Kory Eoga</span>
 
<ul class="nav-links">
<li><a data-section="parcours" onclick="showSection('parcours')">Parcours</a></li>
<li><a data-section="excel" onclick="showSection('excel')">Excel</a></li>
</ul>
 
</nav>
</header>
 
<main class="container">
 
<section id="parcours" class="section active">
<h2>Bienvenue</h2>
<p>Portfolio BTS SIO SISR</p>
</section>
 
<section id="excel" class="section">
<div class="section-header">
<h2>Suivi de compétences</h2>
</div>
 
<div class="card">
<iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRMDrqGzhbFoqPKBdLoWfz61wG6YFI5kTR4VINW1PfqpsECZ3SGAEEDxr5zHnUs1Q/pubhtml?widget=true&headers=false%22></iframe>
</div>
</section>
 
</main>
 
<footer>
<p>© 2026 Kory Eoga</p>
</footer>
 
<script>
function showSection(sectionId) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(sectionId).classList.add('active');
 
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active-link'));
 
  const activeLink = document.querySelector(`.nav-links a[data-section="${sectionId}"]`);
  if (activeLink) activeLink.classList.add('active-link');
}
</script>
 
</body>
</html>
